<html>
  <head>
    <meta charset="utf-8">
    <script type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/brython@3.13.2/brython.min.js">
    </script>
    <script type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/brython@3.13.2/brython_stdlib.js">
    </script>
    <script type="text/python3" src="main.py"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
    >
     <link rel="icon" type="image/png" href="favicon.png">
    <title>Calendar Generator</title>
  </head>

  <body onload="brython()">
    <h1 class="title has-text-centered">Calendar Generator</h1>

    <form id="calendarForm">
      <h2 class="subtitle has-text-centered">Settings</h2>

      <div class="fixed-grid has-3-cols my-0 px-2">
        <div class="grid">
          <div class="field my-0">
            <div class="control">
              <label class="checkbox">
                <input type="checkbox" id="includeDayNames">
                Include names of the days of the week
              </label>
            </div>
          </div>

          <div class="field my-0">
            <div class="control">
              <label class="checkbox">
                <input type="checkbox" id="includeCommentsLine">
                Add line for annotations
              </label>
            </div>
          </div>

          <div class="field my-0">
            <div class="control">
              <label class="checkbox">
                <input type="checkbox" id="includeSeparationLine">
                Add separation line
              </label>
            </div>
          </div>
        </div>
      </div>

      <div class="field px-2 my-3">
        <!-- 
          RFE: Allow to customize the symbols/emojis used for each day of the week.
        -->
        <label class="label">
          Decorators
          <small id="decoratorsWarningField" style="display: none;" class="has-text-info has-text-weight-normal">
            (the use of geometric symbols or emojis may alter the calendar alignment due to varying character widths)
          </small>
        </label>
        <div class="fixed-grid has-4-cols">
          <div class="control grid">
            <label class="radio cell">
              <input type="radio" id="decoratorsNone" name="decorators" value="none" checked>
              None
            </label>
            <label class="radio cell">
              <input type="radio" id="decoratorsBasic" name="decorators" value="basic">
              Use basic symbols
            </label>
            <label class="radio cell">
              <input type="radio" id="decoratorsGeometric" name="decorators" value="geometric">
              Use geometric symbols
            </label>
            <label class="radio cell">
              <input type="radio" id="decoratorsEmojis" name="decorators" value="emojis">
              Use emojis
            </label>
          </div>
        </div>
      </div>

      <div class="fixed-grid has-3-cols px-2">
        <div class="grid">
          <div class="cell py-0 field">
            <label class="label">Year</label>
            <div class="control">
              <input class="input" type="number" id="year" value="2026" min="1900" max="2100">
            </div>
          </div>

          <div class="cell py-0 field">
            <label class="label">Spaces between days</label>
            <div class="control">
              <input class="input" type="number" id="spacesBetween" value="5" min="0">
            </div>
          </div>

          <div class="cell py-0 field">
            <label class="label">Months per row</label>
            <div class="control">
              <input class="input" type="number" id="monthsPerRow" value="3" min="1">
            </div>
          </div>
        </div>
      </div>
    </form>

    <div class="field mt-4" style="overflow-x: auto">
      <h2 class="subtitle has-text-centered">Generated calendar</h2>
      <div class="control">
        <pre id="calendarOutput"></pre>
      </div>
    </div>
  </body>
</html>
